[default]
LOG_LEVEL = "INFO"
USE_OPENTELEMETRY = false

[default.opentel]
OTEL_ENDPOINT = "http://localhost:4317"
SERVICE_NAME = "LLM_Prompt_Transpiler"
SERVICE_VERSION = "1.0.0"

[default.openai]
DEFAULT_OPENAI_BASIC_MODEL = "gpt-4o-mini"
DEFAULT_OPENAI_THINKING_MODEL = "gpt-4o"
TEMPERATURE = 0.0

[default.gemini]
DEFAULT_GEMINI_MODEL = "gemini-2.5-flash"
TEMPERATURE = 0.0

[default.anthropic]
DEFAULT_ANTHROPIC_MODEL = "claude-3-5-sonnet-latest"
TEMPERATURE = 0.0

[default.huggingface]
DEFAULT_HF_MODEL = "meta-llama/Llama-3.3-70B-Instruct"
TEMPERATURE = 0.0
MAX_TOKENS = 4096

[default.roles.architect]
PROVIDER = "openai"
MODEL = "gpt-4o-mini"

[default.roles.decompiler]
PROVIDER = "openai"
MODEL = "gpt-4o-mini"

[default.roles.historian]
PROVIDER = "openai"
MODEL = "gpt-4o-mini"

[default.roles.pilot]
PROVIDER = "openai"
MODEL = "gpt-4o-mini"

[default.roles.judge]
PROVIDER = "openai"
MODEL = "gpt-4o-mini"

[default.roles.diff]
PROVIDER = "openai"
MODEL = "gpt-4o-mini"

[default.transpiler]
MAX_RETRIES = 3
SCORE_THRESHOLD = 0.8
EARLY_STOP_PATIENCE = 1       # Number of retries without improvement before stopping
SCORING_ALGORITHM = "pairwise"

[default.compiler]
MAX_RETRIES = 3
SCORE_THRESHOLD = 0.8
EARLY_STOP_PATIENCE = 1
SCORING_ALGORITHM = "pairwise"
