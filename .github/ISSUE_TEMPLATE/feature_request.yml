name: Feature request
description: Propose a user-facing improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is currently awkward, missing, or unclear?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want and why it would help.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or competing designs you already evaluated.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include prompts, scoring reports, or usage examples if they help explain the request.
